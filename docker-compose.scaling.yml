name: freshfridge-scaling

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD in .env}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - freshfridge
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  db-init:
    build: .
    env_file:
      - .env
    command: npm run db:init
    environment:
      NODE_ENV: production
      DB_SERVER: db
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD in .env}
      DB_DATABASE: ${DB_DATABASE:-FreshFridgeDB}
      DB_TRUSTED_CONNECTION: "false"
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      IOT_USER_ID: ${IOT_USER_ID:-11111111-1111-4111-8111-111111111111}
      IOT_FRIDGE_ID: ${IOT_FRIDGE_ID:-22222222-2222-4222-8222-222222222222}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - freshfridge
    restart: "no"

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      RUN_SCHEDULER: "false"
      DB_SERVER: db
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD in .env}
      DB_DATABASE: ${DB_DATABASE:-FreshFridgeDB}
      DB_TRUSTED_CONNECTION: "false"
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - freshfridge
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${LB_PORT:-3001}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - freshfridge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  iot-simulator:
    build: ./iot-simulator
    profiles:
      - iot
    env_file:
      - ./iot-simulator/.env
    environment:
      TELEMETRY_URL: http://nginx/api/iot/telemetry
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}
      IOT_USER_ID: ${IOT_USER_ID:-11111111-1111-4111-8111-111111111111}
      IOT_USER_EMAIL: iot-device-valid@freshfridge.local
      IOT_FRIDGE_ID: ${IOT_FRIDGE_ID:-22222222-2222-4222-8222-222222222222}
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - freshfridge

volumes:
  mssql-data:

networks:
  freshfridge:
    driver: bridge
