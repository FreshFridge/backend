services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DB_SERVER: db
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${SA_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-FreshFridgeDB}
      DB_TRUSTED_CONNECTION: "false"
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
    ports:
      - "${APP_PORT:-3001}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mssql-data:
