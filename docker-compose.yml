services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-FreshFridge_2026!}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-FreshFridge_2026!}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: .
    command: sh -c "npm run db:init && npm run start"
    env_file:
      - .env
    environment:
      PORT: 3000
      DB_SERVER: db
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${SA_PASSWORD:-FreshFridge_2026!}
      DB_TRUSTED_CONNECTION: "false"
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      IOT_USER_ID: ${IOT_USER_ID:-11111111-1111-4111-8111-111111111111}
      IOT_FRIDGE_ID: ${IOT_FRIDGE_ID:-22222222-2222-4222-8222-222222222222}
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  iot-simulator:
    build: ./iot-simulator
    env_file:
      - ./iot-simulator/.env
    environment:
      TELEMETRY_URL: http://backend:3000/api/iot/telemetry
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me}
      IOT_USER_ID: ${IOT_USER_ID:-11111111-1111-4111-8111-111111111111}
      IOT_USER_EMAIL: iot-device-valid@freshfridge.local
      IOT_FRIDGE_ID: ${IOT_FRIDGE_ID:-22222222-2222-4222-8222-222222222222}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mssql-data:
