      security:
        - BearerAuth: []
      responses:
        "200":
          description: Settings retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - admin role required
        "404":
          description: Settings not found

    patch:
      tags: [Admin]
      summary: Update system settings (admin only)
      description: Update SystemSettings and/or TelemetryThresholds. Creates audit log entry.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemSettingsRequest'
      responses:
        "200":
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
